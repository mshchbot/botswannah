<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Botswannah - Today's Matches</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:#0a0e17;
    color:#e8e8e8;
    font-family:-apple-system,BlinkMacSystem,'Segoe UI',Roboto,Oxygen,sans-serif;
    line-height:1.6;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .container{max-width:500px;padding:32px 20px;width:100%}
  .title{font-size:18px;font-weight:700;color:#fcd116;margin-bottom:20px;text-align:center}
  .links{display:flex;flex-direction:column;gap:12px}
  .link-card{
    background:linear-gradient(135deg,#0f1a2e,#162240);
    border-radius:12px;
    padding:16px 20px;
    border:1px solid rgba(255,255,255,0.06);
    text-decoration:none;
    color:inherit;
    transition:transform 0.2s,border-color 0.2s;
    display:flex;
    align-items:center;
    gap:12px;
  }
  .link-card:hover{
    transform:translateY(-2px);
    border-color:rgba(252,209,22,0.3);
  }
  .link-card .flags{font-size:28px}
  .link-card .text{flex:1}
  .link-card .matchup{font-size:16px;font-weight:700}
  .link-card .stage{font-size:13px;color:#94a3b8}
  .badge{
    display:inline-block;
    font-size:11px;font-weight:600;
    text-transform:uppercase;letter-spacing:0.5px;
    padding:3px 12px;border-radius:12px;
    background:rgba(74,222,128,0.12);
    color:#4ade80;
    border:1px solid rgba(74,222,128,0.2);
  }
</style>
</head>
<body>
<div class="container">
  <div class="title">Today’s Matches •• July 6, 2026</div>
  <div class="links">
    <a href="spain-vs-portugal.html" class="link-card">
      <div class="flags">🏷🏹</div>
      <div class="text">
        <div class="matchup">Spain vs Portugal</div>
        <div class="stage">Round of 16 ·AT&T Stadium, Arlington</div>
      </div>
      <span class="badge">Today</span>
    </a>
    <a href="belgium-vs-usa.html" class="link-card">
      <div class="flags">🇪🔼</div>
      <div class="text">
        <div class="matchup">Belgium vs USA</div>
        <div class="stage">Group Stage</div>
      </div>
      <span class="badge">Today</span>
    </a>
  </div>
</div>
</body>
</html>
