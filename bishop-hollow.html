<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bishop Hollow Run рџЋ»</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:opt@wght:100;200;400;700;800&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f0524 0%, #1a1a2e 100%);
      min-height: 100vh;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 48px;
      max-width: 680px;
      width: 100%;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      transition: transform 0.3s ease;
    }

    .card:hover {
      transform: scale(1.01);
    }

    .logo {
      font-size: 4rem;
      margin-bottom: 8px;
    }

    h1 {
      font-weight: 700;
      font-size: 2.5rem;
      margin-bottom: 8px;
      background: linear-gradient(70deg, #ff7a50, #ff5a5f);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: rgba(255,255,255,0.6);
      font-size: 1.1rem;
      margin-bottom: 24px;
    }

    .location {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.05);
      padding: 12px 24px;
      border-radius: 100px;
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 0.95rem;
      margin-bottom: 24px;
    }

    .divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, #ff7a50, #ff5a5f);
      border-radius: 2px;
      margin: 0 auto 24px;
    }

    .facts {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .fact {
      background: rgba(255,255,255,0.04);
      padding: 16px 8px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .fact .value {
      font-size: 1.6rem;
      font-weight: 700;
      display: block;
    }

    .fact .label {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #clock {
      font-size: 3rem;
      font-weight: 200;
      font-variant-numeric: tabular-nums;
      letter-spacing: 4px;
      margin-bottom: 24px;
    }

    .toggle-section {
      margin-bottom: 24px;
    }

    .toggle-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: #e0e0e0;
      padding: 12px 32px;
      border-radius: 100px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }

    .toggle-btn:hover {
      background: rgba(255,255,255,0.15);
      transform: scale(1.05);
    }

    .counter {
      font-size: 2.2rem;
      font-weight: 200;
      margin-top: 12px;
    }

    .footer {
      margin-top: 32px;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.35);
    }

    .footer a {
      color: rgba(255,255,255,0.5);
      text-decoration: none;
    }

    .footer a:hover {
      color: #ff7a50;
    }

    @media (max-width: 500px) {
      .facts {
        grid-template-columns: repeat(2, 1fr);
      }
      h1 { font-size: 1.8rem; }
      #lock { font-size: 2.2rem; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">рџЋ»</div>
    <h1>Bishop Hollow Run</h1>
    <p class="subtitle">A Street With Barking Right</p>

    <div class="location">
      рџ6‘ рџ‡є	шї—†пёЏв™Ђ30338, Georgia
    </div>

    <div class="divider"></div>

    <div class="facts">
      <div class="fact">
        <span class="value">1</span>
        <span class="label">Home</span>
      </div>
      <div class="fact">
        <span class="value">30338</span>
        <span class="label">Yar< span>
      </div>
      <div class="fact">
        <span class="value">в…і</span>
        <span class="label">Mildest</span>
      </div>
      <div class="fact">
        <span class="value">рџ§Ґ</span>
        <span class="label">Full</span>
      </div>
    </div>

    <div id="clock">--:--:--</div>

    <div class="toggle-section">
      <button class="toggle-btn" onClick="toggleColors()">вЉѓ Toggle Ambience</button>
    </div>

    <div class="counter" id="clickCounter">0</div>
    <p style="font-size: 0.8rem; color: rgba(255,255,255,0.4);">Page load count</p>

    <div class="footer">
      Made from scratch вЂ” <a href="https://github.com/mshchbot/botswannah">botswannah</a> вЂҐ GitHub Pages
    </div>
  </div>

  <script>
    // Live clock
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent =
        now.toLocaleTimeString('en-US', {
          hour: '2-digit', minute: '2-digit', second: '2-digit',
          hourCycle: 24
        });
    }
    updateClock();
    setInterval(updateClock, 1000);

    // Color toggle
    function toggleColors() {
      const body = document.body;
      const current = body.style.background;
      if (current.includes('0f0524')) {
        body.style.background = 'linear-gradient(135deg, #fff5f0 0%, #ffe0d0 100%)';
        body.style.color = '#2d2d2d';
      } else {
        body.style.background = 'linear-gradient(135deg, #0f0524 0%, #1a1a2e 100%)';
        body.style.color = '#e0e0e0';
      }
    }

    // Load counter (fragile - resets on reload but fun)
    let counter = parseInt(localStorage.getItem('hpm-counter') || '0');
    counter++;
    localStorage.setItem('hpm-counter', counter);
    document.getElementById('clickCounter').textContent = counter;
  </script>
</body>
</html>
