<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paraguay vs France - Botswannah</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:#0a0e17;
    color:#e8e8e8;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,sans-serif;
    line-height:1.6;
    min-height:100vh;
    display:flex;
    align-items:flex-start;
    justify-content:center;
  }
  .container{max-width:540px;padding:32px 20px;width:100%}
  h1{font-size:22px;font-weight:700;color:#fcd116;text-align:center;margin-bottom:8px;text-transform:uppercase;letter-spacing:1.5px}
  .subtitle{text-align:center;color:#94a3b8;font-size:13px;margin-bottom:28px}
  .back-link{
    display:inline-block;
    margin-bottom:20px;
    color:#60a5fa;
    text-decoration:none;
  }
  .back-link:hover{text-decoration:underline}
  .match-card{
    background:linear-gradient(135deg,#0f1a2e,#162240);
    border-radius:12px;
    padding:24px;
    border:1px solid rgba(255,255,255,0.06);
    margin-bottom:20px;
  }
  .flags{display:flex;align-items:center;gap:12px;margin-bottom:16px}
  .flags img{height:32px;width:auto}
  .matchup{font-size:24px;font-weight:700;text-align:center;margin-bottom:8px}
  .stage{font-size:14px;color:#94a3b8;text-align:center;margin-bottom:16px}
  .badge{
    display:inline-block;
    font-size:11px;font-weight:600;
    text-transform:uppercase;letter-spacing:0.5px;
    padding:3px 12px;border-radius:12px;
  }
  .badge-yesterday{
    background:rgba(168,85,247,0.12);
    color:#a78bfa;
    border:1px solid rgba(168,85,247,0.2);
  }
  .stats{display:grid;grid-template-columns:repeat(auto-fit, minmax(120px, 1fr));gap:16px;margin-top:20px}
  .stat{
    background:rgba(255,255,255,0.03);
    border-radius:8px;
    padding:12px;
    text-align:center;
  }
  .stat-value{font-size:18px;font-weight:600;display:block;margin-bottom:4px}
  .stat-label{font-size:12px;color:#94a3b8;text-transform:uppercase;letter-spacing:0.5px}
  .result{text-align:center;margin-top:20px;padding:15px;background:rgba(74,222,128,0.1);border-radius:8px;font-weight:600;font-size:18px}
</style>
</head>
<body>
<div class="container">
  <a href="index.html" class="back-link">&larr; Back to Match Analysis</a>
  
  <div class="match-card">
    <div class="flags">
      <img src="https://flagcdn.com/24x18/py.png" alt="Paraguay">
      <img src="https://flagcdn.com/24x18/fr.png" alt="France">
    </div>
    <div class="matchup">Paraguay vs France</div>
    <div class="stage">Round of 16 · Lincoln Financial Field, Philadelphia · Sat, Jul 4 · 1:00 PM ET</div>
    <span class="badge badge-yesterday">Yesterday</span>
    
    <div class="result">France 1 - 0 Paraguay</div>
    
    <div class="stats">
      <div class="stat">
        <span class="stat-value">7/4/2026</span>
        <span class="stat-label">Date</span>
      </div>
      <div class="stat">
        <span class="stat-value">Philadelphia, PA</span>
        <span class="stat-label">Venue</span>
      </div>
      <div class="stat">
        <span class="stat-value">1:00 PM ET</span>
        <span class="stat-label">Kickoff</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
